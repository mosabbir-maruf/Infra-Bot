name = "infra-bot"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# ------------------------------------------------------------
# [vars] — Plain-text, NON-SENSITIVE defaults only.
# These values are pushed to Cloudflare on every deployment
# and will OVERWRITE anything you set in the Dashboard for
# these keys. Do NOT put secrets here.
# ------------------------------------------------------------
[vars]
NODE_ENV    = "production"

# AWS_REGION is NOT set here. It defaults to "us-east-1" in code.
# To override, add it as a plain-text Variable in the Cloudflare Dashboard.
# Keeping it out of [vars] prevents dashboard overrides from being
# overwritten on every deployment.

# ------------------------------------------------------------
# SECRETS — Set these once in the Cloudflare Dashboard:
#   Workers → infra-bot → Settings → Variables and Secrets
#   → Add variable → type the value → click "Encrypt" → Save
#
# Secrets are stored encrypted, are NEVER included in
# wrangler.toml, and survive every new deployment untouched.
#
# Required secrets:
#   TELEGRAM_BOT_TOKEN         – from @BotFather
#   AUTHORIZED_USER_IDS        – your Telegram chat/user ID(s), comma-separated
#   MONITORING_SECRET          – any strong random string
#   SERVERS_CONFIG             – your JSON server registry
#
# Optional secrets (only if you use those providers):
#   AWS_ACCESS_KEY_ID          – IAM user access key
#   AWS_SECRET_ACCESS_KEY      – IAM user secret key
#   DIGITALOCEAN_TOKEN         – DO personal access token
#   TELEGRAM_WEBHOOK_SECRET    – optional extra webhook protection
# ------------------------------------------------------------

[triggers]
crons = ["0 14 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

# ------------------------------------------------------------
# KV Namespace Bindings
# Declared for config parity between local and remote.
# `id` is intentionally omitted — it is account-specific and
# would break portability if committed.
#
# Production (Dashboard Git): bind MONITORING_KV under
#   Settings → Variables → KV Namespace Bindings
#
# Local dev (wrangler dev): create a KV namespace and set
# preview_id below (do NOT commit):
# ------------------------------------------------------------
[[kv_namespaces]]
binding = "MONITORING_KV"
# preview_id = "your-local-namespace-id"
